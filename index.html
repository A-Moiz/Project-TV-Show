<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdul Moiz (A-Moiz)</title>
    <link href="style.css" rel="stylesheet" />
    <script src="script.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1 class="center">TV Show Episodes</h1>
    <p class="center" id="display-info"></p>
    <main>
      <div id="shows-listing"></div>

      <div class="center">
        <div class="cta">
          <label>
            <input
              type="search"
              id="search"
              name="search"
              placeholder="Search..."
            />
          </label>

          <select id="show-select" class="show-select"></select>

          <select id="ep-select" class="ep-select">
            <option value="all">Show all</option>
          </select>

          <button class="back-to-shows">View All Shows</button>
        </div>
      </div>

      <div id="ep-view">
        <div class="ep-container">
          <template id="ep-card">
            <section class="ep-section">
              <h2 class="ep-title"></h2>
              <img class="ep-img" />
              <p class="ep-summary"></p>
            </section>
          </template>
        </div>
      </div>

      <div class="show-container">
        <template id="show-card">
          <section class="show-section">
            <a class="show-link">
              <h2 class="show-title">Title</h2>
              <div class="show-content">
                <img class="show-img" />
                <p class="show-summary">Summary</p>
                <div class="show-meta">
                  <p>
                    <strong>Genres:</strong> <span class="show-genres"></span>
                  </p>
                  <p>
                    <strong>Status:</strong> <span class="show-status"></span>
                  </p>
                  <p>
                    <strong>Rating:</strong> <span class="show-rating"></span>
                  </p>
                  <p>
                    <strong>Runtime:</strong>
                    <span class="show-runtime"></span> mins
                  </p>
                </div>
              </div>
            </a>
          </section>
        </template>
      </div>
    </main>

    <footer class="center">
      <p>
        This data has originally come from
        <span
          ><a href="https://www.tvmaze.com" target="_blank">TVMaze.com</a></span
        >
      </p>
    </footer>
  </body>
</html>
